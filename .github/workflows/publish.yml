name: Publish peaq SDK to PyPI and TestPyPI

on:
  push:
    branches:
      - add/2021325_publish-to-pypi       
    tags:
      - 'v*' 

jobs:
  check-author:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.set-skip.outputs.skip }}
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Get commit author
      id: set-skip
      #id: get-author
      if: ${{ github.actor == secrets.SKIP_USER }}
      run: |
        echo "Triggered by: ${{ github.actor }}. Canceling workflow..."
        curl -X POST \
        -H "Authorization: token ${{ secrets.GIT_TOKEN }}" \
        -H "Accept: application/vnd.github+json" \
        https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/cancel

  build:
    name: Build distribution
    needs: check-author
    if: needs.check-author.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"
    - name: Install pypa/build
      run: >-
        python3 -m
        pip install
        build
        --user
    - name: Check if tag is for PyPI
      id: check_tag
      run: |
        TAG=$(git describe --tags --exact-match || echo "")
        if [[ "$TAG" == "" ]]; then
          echo "No PyPI tag detected, we will bump the version"
          echo "bump=true" >> $GITHUB_ENV
        else
          echo "PyPI tag detected, skipping version bump."
          echo "bump=false" >> $GITHUB_ENV
        fi    
    - name: Bump version
      id: bump_version
      if: env.bump == 'true'
      run: |
        # Read the current version from setup.cfg
        VERSION=$(python -c "import configparser; config = configparser.ConfigParser(); config.read('setup.cfg'); print(config['metadata']['version'])")
        echo "Current version: $VERSION"

        # If the version doesn't already have a .dev suffix, append '.dev1'
        if [[ "$VERSION" != *".dev"* ]]; then
          BASE_VERSION=$VERSION
          DEV_VERSION=1
        else
          # If the version already has a .devX suffix, increment the X part
          BASE_VERSION=$(echo $VERSION | sed 's/\(.*\)\.dev[0-9]\+/\1/')  # Strip current .devX part
          DEV_VERSION=$(echo $VERSION | sed 's/.*\.dev\([0-9]\+\)/\1/')  # Extract current dev number
          DEV_VERSION=$((DEV_VERSION + 1))  # Increment dev number
        fi

        # Construct the new version (e.g., 0.0.1 -> 0.0.1.dev1, 0.0.1.dev1 -> 0.0.1.dev2)
        NEW_VERSION="$BASE_VERSION.dev$DEV_VERSION"
        echo "Bumping version to $NEW_VERSION"

        # Update the version in setup.cfg
        sed -i "s/version = $VERSION/version = $NEW_VERSION/" setup.cfg

        # Output the new version for further steps
        echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
    - name: Commit and push updated setup.cfg
      if: env.bump == 'true'
      run: |
        # Commit and push the updated version in setup.cfg
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add setup.cfg
        git commit -m "Bump version to $NEW_VERSION"
        git push https://x-access-token:${{ secrets.GIT_TOKEN }}@github.com/${{ github.repository }} HEAD:${{ github.ref }}
    
    - name: Build a binary wheel and a source tarball
      run: python3 -m build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  publish-to-pypi:
    name: >-
      Publish Python  distribution  to PyPI
    if: startsWith(github.ref, 'refs/tags/')  # only publish to PyPI on tag pushes
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/peaq-sdk 
    permissions:
      id-token: write

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: >-
      Sign the Python distribution with Sigstore
      and upload them to GitHub Release
    needs:
    - publish-to-pypi
    runs-on: ubuntu-latest

    permissions:
      contents: write  
      id-token: write  
    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Sign the dists with Sigstore
      uses: sigstore/gh-action-sigstore-python@v3.0.0
      with:
        inputs: >-
          ./dist/*.tar.gz
          ./dist/*.whl
    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: >-
        gh release create
        "$GITHUB_REF_NAME"
        --repo "$GITHUB_REPOSITORY"
        --notes ""
    - name: Upload artifact signatures to GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: >-
        gh release upload
        "$GITHUB_REF_NAME" dist/**
        --repo "$GITHUB_REPOSITORY"

  publish-to-testpypi:
    name: Publish Python distribution to TestPyPI
    needs:
    - build
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/peaq-sdk

    permissions:
      id-token: write

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        verbose: true